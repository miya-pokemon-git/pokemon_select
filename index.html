<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>パルデア抽選</title>
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="パルデア抽選" />
  <style>
    :root {
      --bg: #f6f7fb;
      --text: #1f2937;
      --sub: #6b7280;
      --border: #dbe2ea;
      --accent: #2563eb;
      --chip: #eef2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #f6f7fb 45%, #f6f7fb 100%);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(16px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom)) 14px;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      background: rgba(255,255,255,.96);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(37,99,235,.14);
    }

    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .icon {
      width: 48px; height: 48px; border-radius: 16px;
      display: grid; place-items: center;
      background: var(--accent); color: #fff; font-size: 24px;
      box-shadow: 0 10px 20px rgba(37,99,235,.28);
      flex: 0 0 auto;
    }

    h1 { margin: 0; font-size: 28px; letter-spacing: -0.02em; }
    p { margin: 0; color: var(--sub); line-height: 1.6; }

    .options {
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f9fbff;
      display: grid;
      gap: 12px;
    }

    .options label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
    }

    input[type="checkbox"] { width: 20px; height: 20px; margin-top: 1px; flex: 0 0 auto; }

    .controls { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }

    button {
      appearance: none; -webkit-appearance: none;
      border: none; border-radius: 14px;
      padding: 14px 18px; min-height: 50px; width: 100%;
      font-size: 16px; font-weight: 800; cursor: pointer;
      font-family: inherit;
    }

    button:active { transform: scale(.98); }
    button:disabled { opacity: .55; cursor: wait; }
    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #e5e7eb; color: var(--text); }

    .status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8fafc;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .result {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: #fbfdff;
      text-align: center;
      overflow: hidden;
    }

    .image-wrap {
      width: 100%; aspect-ratio: 1 / 1;
      display: grid; place-items: center;
      background: #f1f5f9; border-radius: 14px; margin-bottom: 10px;
    }

    .pokemon-image { width: 84%; height: 84%; object-fit: contain; }
    .skeleton {
      width: 70%; height: 70%; border-radius: 999px;
      background: linear-gradient(90deg, #e5e7eb, #f8fafc, #e5e7eb);
      background-size: 200% 100%; animation: shimmer 1.1s infinite linear;
    }

    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    .label { font-size: 13px; color: var(--sub); margin-bottom: 4px; }
    .number { font-size: 24px; font-weight: 900; }
    .name { margin-top: 4px; font-size: 18px; font-weight: 900; line-height: 1.4; }
    .info { margin-top: 10px; display: grid; gap: 8px; text-align: left; }
    .info-title { font-size: 12px; color: var(--sub); font-weight: 800; margin-bottom: 4px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      display: inline-flex; align-items: center;
      border-radius: 999px; background: var(--chip);
      padding: 4px 9px; font-size: 12px; font-weight: 800; line-height: 1.3;
    }

    .ability-chip {
      border: none; width: auto; min-height: auto; cursor: pointer;
      color: var(--text); font-family: inherit;
    }

    .ability-popover {
      margin-top: 10px; padding: 10px 12px;
      border-radius: 12px; background: #fff7ed;
      border: 1px solid #fed7aa; color: #7c2d12;
      font-size: 13px; font-weight: 700; line-height: 1.6; text-align: left;
      position: relative;
    }

    .ability-popover::before {
      content: ""; position: absolute; top: -7px; left: 18px;
      width: 12px; height: 12px; background: #fff7ed;
      border-left: 1px solid #fed7aa; border-top: 1px solid #fed7aa;
      transform: rotate(45deg);
    }

    .ability-popover-title { margin-bottom: 4px; font-size: 12px; color: #9a3412; }
    .note { margin-top: 18px; font-size: 13px; color: var(--sub); line-height: 1.5; }

    @media (min-width: 641px) { .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 760px) { .result { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 480px) {
      .container { padding: 16px; border-radius: 18px; }
      h1 { font-size: 24px; }
      .result { grid-template-columns: 1fr; }
      .name { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <div class="icon">🎲</div>
      <div>
        <h1>パルデア抽選</h1>
        <p>ポケモンSV パルデア図鑑から6体を重複なしで選出</p>
      </div>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" id="excludeSpecial" />
        <span>伝説・準伝説・パラドックスを除外する</span>
      </label>
      <label>
        <input type="checkbox" id="finalOnly" />
        <span>最終進化系のみ</span>
      </label>
    </div>

    <div class="controls">
      <button class="primary" id="drawButton" disabled>読み込み中...</button>
      <button class="secondary" id="copyButton">結果をコピー</button>
    </div>

    <div class="status" id="status">パルデア図鑑データを読み込み中です。</div>
    <section class="result" id="result"></section>

    <div class="note">
      初回は通信が必要です。取得済みデータは端末に保存され、次回以降は速く表示されます。<br />
    </div>
  </main>

  <script>
    const PICK_COUNT = 6;
    const PALDEA_DEX_URL = "https://pokeapi.co/api/v2/pokedex/paldea";
    const DEX_CACHE_KEY = "paldea_dex_cache_v5";
    const DETAIL_CACHE_KEY = "paldea_detail_cache_v5";
    const FINAL_CACHE_KEY = "paldea_final_cache_v5";
    const CHAIN_CACHE_KEY = "paldea_chain_cache_v5";

    const EXCLUDED_NUMBERS = new Set([
      376, 377, 378, 379, 380, 381, 382, 383, 384, 385, 386, 387,
      393, 394, 395, 396,
      397, 398,
      399, 400
    ]);

    const TYPE_JA = {
      normal: "ノーマル", fire: "ほのお", water: "みず", electric: "でんき", grass: "くさ", ice: "こおり",
      fighting: "かくとう", poison: "どく", ground: "じめん", flying: "ひこう", psychic: "エスパー", bug: "むし",
      rock: "いわ", ghost: "ゴースト", dragon: "ドラゴン", dark: "あく", steel: "はがね", fairy: "フェアリー"
    };

    const FORM_OVERRIDES = {
      53: "wooper-paldea",
      223: "tauros-paldea-combat-breed"
    };

    const resultEl = document.getElementById("result");
    const drawButton = document.getElementById("drawButton");
    const copyButton = document.getElementById("copyButton");
    const statusEl = document.getElementById("status");
    const excludeSpecialCheckbox = document.getElementById("excludeSpecial");
    const finalOnlyCheckbox = document.getElementById("finalOnly");

    let paldeaEntries = [];
    let detailCache = loadStorage(DETAIL_CACHE_KEY, {});
    let finalCache = loadStorage(FINAL_CACHE_KEY, {});
    let chainCache = loadStorage(CHAIN_CACHE_KEY, {});
    const pendingRequests = new Map();

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function loadStorage(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (_) {
        return fallback;
      }
    }

    function saveStorage(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (_) {}
    }

    async function fetchJson(url) {
      if (pendingRequests.has(url)) return pendingRequests.get(url);

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 15000);

      const request = fetch(url, { signal: controller.signal })
        .then(res => {
          if (!res.ok) throw new Error("データ取得に失敗しました");
          return res.json();
        })
        .finally(() => {
          clearTimeout(timer);
          pendingRequests.delete(url);
        });

      pendingRequests.set(url, request);
      return request;
    }

    function getJapaneseName(names, fallback) {
      const found = names.find(n => n.language.name === "ja-Hrkt") || names.find(n => n.language.name === "ja");
      return found ? found.name : fallback;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadPaldeaDex() {
      const cached = loadStorage(DEX_CACHE_KEY, null);
      if (Array.isArray(cached) && cached.length >= 400) {
        paldeaEntries = cached;
        return;
      }

      const data = await fetchJson(PALDEA_DEX_URL);
      paldeaEntries = data.pokemon_entries
        .filter(entry => entry.entry_number >= 1 && entry.entry_number <= 400)
        .map(entry => ({
          no: entry.entry_number,
          speciesName: entry.pokemon_species.name,
          speciesUrl: entry.pokemon_species.url
        }))
        .sort((a, b) => a.no - b.no);

      saveStorage(DEX_CACHE_KEY, paldeaEntries);
    }

    function getBaseCandidates() {
      return excludeSpecialCheckbox.checked
        ? paldeaEntries.filter(entry => !EXCLUDED_NUMBERS.has(entry.no))
        : paldeaEntries;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function findEvolutionNode(chain, speciesName) {
      if (chain.species && chain.species.name === speciesName) return chain;
      for (const next of chain.evolves_to || []) {
        const found = findEvolutionNode(next, speciesName);
        if (found) return found;
      }
      return null;
    }

    function saveFinalInfoFromChain(chainData) {
      const stack = [chainData.chain];
      while (stack.length) {
        const node = stack.pop();
        const name = node.species?.name;
        if (name) {
          const entry = paldeaEntries.find(item => item.speciesName === name);
          if (entry) finalCache[String(entry.no)] = !(node.evolves_to && node.evolves_to.length);
        }
        for (const next of node.evolves_to || []) stack.push(next);
      }
      saveStorage(FINAL_CACHE_KEY, finalCache);
    }

    async function isFinalEvolution(entry) {
      const key = String(entry.no);
      if (typeof finalCache[key] === "boolean") return finalCache[key];

      const speciesData = await fetchJson(entry.speciesUrl);
      const chainUrl = speciesData.evolution_chain?.url;
      if (!chainUrl) {
        finalCache[key] = true;
        saveStorage(FINAL_CACHE_KEY, finalCache);
        return true;
      }

      let chainData = chainCache[chainUrl];
      if (!chainData) {
        chainData = await fetchJson(chainUrl);
        chainCache[chainUrl] = chainData;
        saveStorage(CHAIN_CACHE_KEY, chainCache);
      }

      saveFinalInfoFromChain(chainData);

      if (typeof finalCache[key] === "boolean") return finalCache[key];

      const node = findEvolutionNode(chainData.chain, speciesData.name);
      const isFinal = Boolean(node) && !(node.evolves_to && node.evolves_to.length);
      finalCache[key] = isFinal;
      saveStorage(FINAL_CACHE_KEY, finalCache);
      return isFinal;
    }

    async function drawEntries() {
      const base = shuffle([...getBaseCandidates()]);

      if (!finalOnlyCheckbox.checked) {
        return base.slice(0, PICK_COUNT).sort((a, b) => a.no - b.no);
      }

      const selected = [];
      let checked = 0;

      for (const entry of base) {
        if (selected.length >= PICK_COUNT) break;
        checked++;
        if (checked === 1 || checked % 8 === 0) {
          setStatus(`最終進化系を確認中です。候補確認 ${checked} 件 / 選出 ${selected.length}/6`);
        }
        try {
          if (await isFinalEvolution(entry)) selected.push(entry);
        } catch (e) {
          console.warn("最終進化判定をスキップ", entry, e);
        }
      }

      if (selected.length < PICK_COUNT) throw new Error("抽選対象が不足しています。通信環境を確認してください。");
      return selected.sort((a, b) => a.no - b.no);
    }

    function getPokemonApiName(entry, speciesData) {
      if (FORM_OVERRIDES[entry.no]) return FORM_OVERRIDES[entry.no];
      const defaultVariety = speciesData.varieties.find(v => v.is_default) || speciesData.varieties[0];
      return defaultVariety.pokemon.name;
    }

    function getAbilityDescription(abilityData) {
      const jaFlavor = abilityData.flavor_text_entries?.find(entry => entry.language.name === "ja-Hrkt")
        || abilityData.flavor_text_entries?.find(entry => entry.language.name === "ja");
      const enFlavor = abilityData.flavor_text_entries?.find(entry => entry.language.name === "en");
      const text = jaFlavor?.flavor_text || enFlavor?.flavor_text || "説明を取得できませんでした。";
      return text.replace(/[\n\f]/g, " ");
    }

    async function loadAbilityInfo(item) {
      const abilityData = await fetchJson(item.ability.url);
      const baseName = getJapaneseName(abilityData.names, item.ability.name);
      return {
        name: item.is_hidden ? `${baseName}（隠れ）` : baseName,
        description: getAbilityDescription(abilityData)
      };
    }

    async function loadDetail(entry) {
      const key = String(entry.no);
      if (detailCache[key]) return detailCache[key];

      const speciesData = await fetchJson(entry.speciesUrl);
      const pokemonApiName = getPokemonApiName(entry, speciesData);
      const pokemonData = await fetchJson(`https://pokeapi.co/api/v2/pokemon/${pokemonApiName}`);

      const detail = {
        no: entry.no,
        name: getJapaneseName(speciesData.names, entry.speciesName),
        types: pokemonData.types.sort((a, b) => a.slot - b.slot).map(t => TYPE_JA[t.type.name] || t.type.name),
        abilities: await Promise.all(pokemonData.abilities.sort((a, b) => a.slot - b.slot).map(loadAbilityInfo)),
        image: pokemonData.sprites?.other?.["official-artwork"]?.front_default || pokemonData.sprites?.other?.home?.front_default || pokemonData.sprites?.front_default || ""
      };

      detailCache[key] = detail;
      saveStorage(DETAIL_CACHE_KEY, detailCache);
      return detail;
    }

    function renderLoading(entries) {
      resultEl.innerHTML = entries.map((entry, index) => `
        <div class="card">
          <div class="image-wrap"><div class="skeleton"></div></div>
          <div class="label">${index + 1}体目</div>
          <div class="number">No.${entry.no}</div>
          <div class="name">取得中...</div>
        </div>
      `).join("");
    }

    function normalizeAbility(ability) {
      return typeof ability === "string" ? { name: ability, description: "説明は再取得後に表示されます。" } : ability;
    }

    function render(details) {
      resultEl.innerHTML = details.map((pokemon, index) => {
        const abilities = pokemon.abilities.map(normalizeAbility);
        const abilityNames = abilities.map(ability => ability.name);
        return `
          <div class="card" data-copy="No.${pokemon.no} ${escapeHtml(pokemon.name)} / ${escapeHtml(pokemon.types.join("・"))} / ${escapeHtml(abilityNames.join("・"))}">
            <div class="image-wrap">
              ${pokemon.image ? `<img class="pokemon-image" src="${pokemon.image}" alt="${escapeHtml(pokemon.name)}" loading="eager" decoding="async" />` : "画像なし"}
            </div>
            <div class="label">${index + 1}体目</div>
            <div class="number">No.${pokemon.no}</div>
            <div class="name">${escapeHtml(pokemon.name)}</div>
            <div class="info">
              <div>
                <div class="info-title">タイプ</div>
                <div class="chips">${pokemon.types.map(type => `<span class="chip">${escapeHtml(type)}</span>`).join("")}</div>
              </div>
              <div>
                <div class="info-title">特性</div>
                <div class="chips">
                  ${abilities.map(ability => `
                    <button class="chip ability-chip" type="button" data-ability-name="${escapeHtml(ability.name)}" data-ability-description="${escapeHtml(ability.description)}">
                      ${escapeHtml(ability.name)}
                    </button>
                  `).join("")}
                </div>
                <div class="ability-popover" hidden></div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function drawAndRender() {
      if (!paldeaEntries.length) return;

      drawButton.disabled = true;
      drawButton.textContent = "取得中...";
      resultEl.innerHTML = "";

      try {
        const entries = await drawEntries();
        const cachedCount = entries.filter(entry => detailCache[String(entry.no)]).length;
        renderLoading(entries);
        setStatus(cachedCount === entries.length ? "保存済みデータから表示中です。" : `詳細取得中です。保存済み ${cachedCount}/6 件を利用します。`);

        const details = await Promise.all(entries.map(loadDetail));
        render(details);
        setStatus(cachedCount === entries.length ? "選出完了。通信なしで表示しました。" : "選出完了。取得データを保存しました。次回以降は速くなります。");
      } catch (error) {
        console.error(error);
        setStatus("読み込みに失敗しました。\n通信環境を確認するか、ページを再読み込みしてください。\nGitHub Pagesを更新した直後は、URL末尾に ?v=5 を付けると反映されやすいです。");
      } finally {
        drawButton.disabled = false;
        drawButton.textContent = "6体を抽選";
      }
    }

    function getCurrentResultsText() {
      return Array.from(document.querySelectorAll(".card"))
        .map(card => card.dataset.copy)
        .filter(Boolean)
        .join("\n");
    }

    copyButton.addEventListener("click", async () => {
      const text = getCurrentResultsText();
      if (!text) {
        alert("先に抽選してください。");
        return;
      }

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.top = "-9999px";
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
        }
        alert(`結果をコピーしました。\n${text}`);
      } catch (_) {
        alert(`コピーできなかったため、手動でコピーしてください。\n${text}`);
      }
    });

    resultEl.addEventListener("click", event => {
      const button = event.target.closest(".ability-chip");
      if (!button) return;

      const card = button.closest(".card");
      const popover = card.querySelector(".ability-popover");
      const title = button.dataset.abilityName;
      const description = button.dataset.abilityDescription;
      const alreadyOpen = !popover.hidden && popover.dataset.currentAbility === title;

      if (alreadyOpen) {
        popover.hidden = true;
        popover.dataset.currentAbility = "";
        return;
      }

      popover.innerHTML = `
        <div class="ability-popover-title">${escapeHtml(title)}</div>
        <div>${escapeHtml(description)}</div>
      `;
      popover.dataset.currentAbility = title;
      popover.hidden = false;
    });

    drawButton.addEventListener("click", drawAndRender);
    excludeSpecialCheckbox.addEventListener("change", () => { if (paldeaEntries.length) drawAndRender(); });
    finalOnlyCheckbox.addEventListener("change", () => { if (paldeaEntries.length) drawAndRender(); });

    (async function init() {
      try {
        await loadPaldeaDex();
        drawButton.disabled = false;
        drawButton.textContent = "6体を抽選";
        setStatus(Object.keys(detailCache).length
          ? `準備完了。詳細 ${Object.keys(detailCache).length} 件 / 最終進化判定 ${Object.keys(finalCache).length} 件を保存済みです。`
          : "準備完了。初回抽選時にデータを取得します。"
        );
      } catch (error) {
        console.error(error);
        drawButton.textContent = "読み込み失敗";
        setStatus("パルデア図鑑データを取得できませんでした。\nGitHub PagesのURLで開いているか、通信環境を確認してください。\n更新直後はURL末尾に ?v=5 を付けてください。");
      }
    })();
  </script>
</body>
</html>
